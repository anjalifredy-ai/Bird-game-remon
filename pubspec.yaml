name: bird_game
description: A polished, casual-friendly flappy-style mobile game built with Flutter Flame.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Game engine
  flame: ^1.18.0
  flame_audio: ^2.1.0

  # State + persistence
  shared_preferences: ^2.2.3
  provider: ^6.1.2

  # Sharing score on Game Over screen
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/bird/
    - assets/images/background/
    - assets/sounds/
